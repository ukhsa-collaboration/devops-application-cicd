name: "Build Test Container"

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      service_identifier:
        required: true
        type: string
      aws_region:
        required: false
        default: "eu-west-2"
        type: string
      runner_labels:
        required: false
        default: '["ubuntu-latest"]'
        type: string
      docker_context:
        required: false
        default: "."
        type: string
      dockerfile:
        required: false
        default: "Dockerfile"
        type: string
      registry_hostname:
        required: false
        default: ""
        type: string
      registry_account_id:
        required: false
        default: ""
        type: string
      aws_registry_role_name:
        required: false
        default: ""
        type: string
      aws_registry_role_to_assume:
        required: false
        default: ""
        type: string
      build_args:
        required: false
        default: ""
        type: string
      run_unit_tests:
        required: false
        default: true
        type: boolean
      unit_test_command:
        required: false
        default: "pytest -q"
        type: string
      run_integration_tests:
        required: false
        default: false
        type: boolean
      integration_test_command:
        required: false
        default: ""
        type: string
      integration_artifact_path:
        required: false
        default: "test-results/"
        type: string
      run_container_smoke_test:
        required: false
        default: false
        type: boolean
      container_smoke_test_command:
        required: false
        default: 'docker run --rm "$IMAGE_UNDER_TEST"'
        type: string
      push_image:
        required: false
        default: false
        type: boolean
      release_tag:
        required: false
        default: ""
        type: string
      sign_release:
        required: false
        default: false
        type: boolean
      lint_dockerfile:
        required: false
        default: true
        type: boolean
      lint_python:
        required: false
        default: true
        type: boolean
      pip_install_extras:
        required: false
        default: "dev"
        type: string
      ecr_registry_namespace:
        required: false
        default: ""
        type: string
    secrets:
      AWS_REGISTRY_ROLE:
        required: false
    outputs:
      image_digest:
        value: ${{ jobs.build.outputs.image_digest }}
      image_uri:
        value: ${{ jobs.build.outputs.image_uri }}
      immutable_image:
        value: ${{ jobs.build.outputs.immutable_image }}

permissions:
  contents: read
  id-token: write
  actions: read
  pull-requests: write

env:
  APP_NAME: ${{ inputs.app_name }}
  AWS_REGION: ${{ inputs.aws_region }}
  ECR_NAMESPACE: ${{ inputs.ecr_registry_namespace || inputs.service_identifier }}
  LOCAL_ACT: ${{ github.actor == 'nektos/act' && 'true' || 'false' }}

jobs:
  build:
    name: Build and test image
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
      actions: read
      pull-requests: write
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_uri: ${{ steps.image-ref.outputs.image_ref }}
      immutable_image: ${{ steps.immutable-image.outputs.value }}
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955

      - name: Resolve image repository
        id: image-repository
        uses: ukhsa-collaboration/devops-application-cicd/actions/build-helper@main
        with:
          operation: resolve-image-repository
          registry_hostname: ${{ inputs.registry_hostname }}
          registry_account_id: ${{ inputs.registry_account_id }}
          aws_region: ${{ env.AWS_REGION }}
          ecr_namespace: ${{ env.ECR_NAMESPACE }}
          app_name: ${{ env.APP_NAME }}

      - name: Resolve registry role
        id: registry-role
        uses: ukhsa-collaboration/devops-application-cicd/actions/build-helper@main
        with:
          operation: resolve-registry-role
          registry_account_id: ${{ inputs.registry_account_id }}
          registry_role_name: ${{ inputs.aws_registry_role_name }}
          registry_role_arn: ${{ inputs.aws_registry_role_to_assume }}
          registry_role_secret: ${{ secrets.AWS_REGISTRY_ROLE }}

      - name: Validate publish configuration
        if: inputs.push_image || inputs.sign_release
        uses: ukhsa-collaboration/devops-application-cicd/actions/build-helper@main
        with:
          operation: validate-publish-config
          image_repository: ${{ steps.image-repository.outputs.image_repository }}
          registry_host: ${{ steps.image-repository.outputs.registry_host }}
          aws_registry_role_to_assume: ${{ steps.registry-role.outputs.value }}

      - name: Lint Dockerfile with Hadolint
        if: inputs.lint_dockerfile
        id: hadolint
        uses: ukhsa-collaboration/devops-application-cicd/actions/build-helper@main
        with:
          operation: lint-dockerfile
          dockerfile: ${{ inputs.dockerfile }}

      - name: Set up Python
        if: inputs.lint_python || inputs.run_unit_tests || inputs.run_integration_tests
        id: setup-python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065

      - name: Install Ruff
        if: inputs.lint_python
        run: python -m pip install ruff

      - name: Ruff formatting
        if: inputs.lint_python
        id: ruff-format
        env:
          NO_COLOR: 1
        run: ruff format --check --diff ${{ inputs.docker_context }}

      - name: Ruff linting
        if: inputs.lint_python
        id: ruff-lint
        env:
          NO_COLOR: 1
        run: ruff check --diff ${{ inputs.docker_context }}

      - name: Generate dependency cache manifest
        if: inputs.run_unit_tests || inputs.run_integration_tests
        uses: ukhsa-collaboration/devops-application-cicd/actions/build-helper@main
        with:
          operation: generate-dependency-cache-manifest
          pip_extras: ${{ inputs.pip_install_extras }}
          docker_context: ${{ inputs.docker_context }}
          dependency_manifest_path: .github/.cache/python-deps-manifest.txt

      - name: Configure Python dependency caching
        if: inputs.run_unit_tests || inputs.run_integration_tests
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .cache/pip
            .cache/uv
          key: ${{ runner.os }}-pydeps-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('.github/.cache/python-deps-manifest.txt') }}
          restore-keys: |
            ${{ runner.os }}-pydeps-${{ steps.setup-python.outputs.python-version }}-
            ${{ runner.os }}-pydeps-

      - name: Install project dependencies
        if: inputs.run_unit_tests || inputs.run_integration_tests
        uses: ukhsa-collaboration/devops-application-cicd/actions/build-helper@main
        with:
          operation: install-dependencies
          pip_extras: ${{ inputs.pip_install_extras }}
          docker_context: ${{ inputs.docker_context }}

      - name: Run unit tests
        if: inputs.run_unit_tests
        id: unit-tests
        env:
          UNIT_TEST_COMMAND: ${{ inputs.unit_test_command }}
        run: bash -eo pipefail -c "$UNIT_TEST_COMMAND"

      - name: Upload coverage artifact
        if: inputs.run_unit_tests && always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: ignore
          retention-days: 7

      - name: Run integration tests
        if: inputs.run_integration_tests
        id: integration-tests
        env:
          INTEGRATION_TEST_COMMAND: ${{ inputs.integration_test_command }}
        run: bash -eo pipefail -c "$INTEGRATION_TEST_COMMAND"

      - name: Upload integration artifacts
        if: inputs.run_integration_tests && always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: integration-artifacts
          path: ${{ inputs.integration_artifact_path }}
          if-no-files-found: ignore
          retention-days: 7

      - name: Configure AWS credentials
        if: inputs.push_image || inputs.sign_release
        uses: aws-actions/configure-aws-credentials@5fd3084fc36e372ff1fff382a39b10d03659f355
        with:
          role-to-assume: ${{ steps.registry-role.outputs.value }}
          role-session-name: container-build-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: inputs.push_image
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076

      - name: Extract Docker metadata
        if: env.LOCAL_ACT != 'true'
        id: meta
        uses: docker/metadata-action@c1e51972afc2121e065aed6d45c65596fe445f3f
        with:
          images: ${{ steps.image-repository.outputs.image_repository }}
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=${{ inputs.release_tag }},enable=${{ inputs.release_tag != '' }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp || github.event.pull_request.updated_at }}

      - name: Generate Docker metadata for act
        if: env.LOCAL_ACT == 'true'
        id: meta-act
        uses: ukhsa-collaboration/devops-application-cicd/actions/build-helper@main
        with:
          operation: generate-docker-metadata
          image_repository: ${{ steps.image-repository.outputs.image_repository }}
          release_tag: ${{ inputs.release_tag }}
          github_sha: ${{ github.sha }}
          github_repository: ${{ github.repository }}

      - name: Capture image reference
        id: image-ref
        uses: ukhsa-collaboration/devops-application-cicd/actions/build-helper@main
        with:
          operation: capture-image-ref
          meta_tags: ${{ steps.meta.outputs.tags != '' && steps.meta.outputs.tags || steps.meta-act.outputs.tags }}

      - name: Determine application version
        id: image-version
        uses: ukhsa-collaboration/devops-application-cicd/actions/build-helper@main
        with:
          operation: resolve-app-version
          release_tag: ${{ inputs.release_tag }}
          default_tag: ${{ steps.image-ref.outputs.image_tag }}

      - name: Build container image
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        with:
          context: ${{ inputs.docker_context }}
          file: ${{ inputs.dockerfile }}
          push: ${{ inputs.push_image }}
          load: ${{ inputs.push_image == false }}
          tags: ${{ steps.meta.outputs.tags != '' && steps.meta.outputs.tags || steps.meta-act.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels != '' && steps.meta.outputs.labels || steps.meta-act.outputs.labels }}
          cache-from: ${{ inputs.push_image && format('type=registry,ref={0}:buildcache', steps.image-repository.outputs.image_repository) || '' }}
          cache-to: ${{ inputs.push_image && 'type=inline' || '' }}
          build-args: |
            APP_CODE_COMMIT_HASH=${{ github.sha }}
            APP_VERSION=${{ steps.image-version.outputs.value }}
            ${{ inputs.build_args }}

      - name: Smoke test built container
        if: inputs.run_container_smoke_test
        id: container-smoke-test
        uses: ukhsa-collaboration/devops-application-cicd/actions/build-helper@main
        with:
          operation: smoke-test-container
          image_under_test: ${{ steps.image-ref.outputs.image_ref }}
          container_smoke_test_command: ${{ inputs.container_smoke_test_command }}
          push_image: ${{ inputs.push_image }}

      - name: Capture immutable image reference
        if: inputs.push_image
        id: immutable-image
        uses: ukhsa-collaboration/devops-application-cicd/actions/build-helper@main
        with:
          operation: capture-immutable-image
          image_repository: ${{ steps.image-repository.outputs.image_repository }}
          image_digest: ${{ steps.build.outputs.digest }}

      - name: Install Cosign
        if: inputs.push_image && inputs.release_tag != '' && inputs.sign_release
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159

      - name: Sign release image digest
        if: inputs.push_image && inputs.release_tag != '' && inputs.sign_release
        env:
          IMAGE: ${{ steps.immutable-image.outputs.value }}
        run: cosign sign --yes "$IMAGE"

      - name: Summarise results
        if: always()
        id: build-summary
        uses: ukhsa-collaboration/devops-application-cicd/actions/build-helper@main
        with:
          operation: build-summary
          hadolint_outcome: ${{ steps.hadolint.outcome || 'skipped' }}
          unit_outcome: ${{ steps.unit-tests.outcome || 'skipped' }}
          int_outcome: ${{ steps.integration-tests.outcome || 'skipped' }}
          container_smoke_outcome: ${{ steps.container-smoke-test.outcome || 'skipped' }}
          push_image: ${{ inputs.push_image }}
          image_ref: ${{ steps.image-ref.outputs.image_ref }}
          immutable_image: ${{ steps.immutable-image.outputs.value || '' }}
          build_outcome: ${{ steps.build.outcome || 'skipped' }}
          summary_file: ci-summary.md

      - name: Share summary in pull requests
        if: always() && github.event_name == 'pull_request' && env.LOCAL_ACT != 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const fs = require('fs');
            const summaryPath = 'ci-summary.md';
            if (!fs.existsSync(summaryPath)) {
              core.info('Summary file not found; skipping comment update.');
              return;
            }
            const issueNumber = context.payload?.pull_request?.number;
            if (!issueNumber) {
              core.info('No pull request number available; skipping comment update.');
              return;
            }
            const body = fs.readFileSync(summaryPath, 'utf8');
            const marker = '<!-- container-image-build summary -->';
            const finalBody = `${marker}\n${body}`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              issue_number: issueNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(
              (comment) => comment.user.type === 'Bot' && comment.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: finalBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: finalBody,
              });
            }
