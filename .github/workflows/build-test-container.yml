name: "Build Test Container"

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      service_identifier:
        required: true
        type: string
      aws_region:
        required: false
        default: "eu-west-2"
        type: string
      runner_labels:
        required: false
        default: '["ubuntu-latest"]'
        type: string
      docker_context:
        required: false
        default: "."
        type: string
      dockerfile:
        required: false
        default: "Dockerfile"
        type: string
      registry_hostname:
        required: false
        default: ""
        type: string
      registry_account_id:
        required: false
        default: ""
        type: string
      aws_registry_role_name:
        required: false
        default: ""
        type: string
      aws_registry_role_to_assume:
        required: false
        default: ""
        type: string
      build_args:
        required: false
        default: ""
        type: string
      run_unit_tests:
        required: false
        default: true
        type: boolean
      unit_test_command:
        required: false
        default: "pytest -q"
        type: string
      run_integration_tests:
        required: false
        default: false
        type: boolean
      integration_test_command:
        required: false
        default: ""
        type: string
      integration_artifact_path:
        required: false
        default: "test-results/"
        type: string
      run_container_smoke_test:
        required: false
        default: false
        type: boolean
      container_smoke_test_command:
        required: false
        default: 'docker run --rm "$IMAGE_UNDER_TEST"'
        type: string
      push_image:
        required: false
        default: false
        type: boolean
      release_tag:
        required: false
        default: ""
        type: string
      sign_release:
        required: false
        default: false
        type: boolean
      lint_dockerfile:
        required: false
        default: true
        type: boolean
      lint_python:
        required: false
        default: true
        type: boolean
      pip_install_extras:
        required: false
        default: "dev"
        type: string
      ecr_registry_namespace:
        required: false
        default: ""
        type: string
    secrets:
      AWS_REGISTRY_ROLE:
        required: false
    outputs:
      image_digest:
        value: ${{ jobs.build.outputs.image_digest }}
      image_uri:
        value: ${{ jobs.build.outputs.image_uri }}
      immutable_image:
        value: ${{ jobs.build.outputs.immutable_image }}

permissions:
  contents: read
  id-token: write
  actions: read
  pull-requests: write

env:
  APP_NAME: ${{ inputs.app_name }}
  AWS_REGION: ${{ inputs.aws_region }}
  ECR_NAMESPACE: ${{ inputs.ecr_registry_namespace || inputs.service_identifier }}
  LOCAL_ACT: ${{ github.actor == 'nektos/act' && 'true' || 'false' }}

jobs:
  build:
    name: Build and test image
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
      actions: read
      pull-requests: write
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_uri: ${{ steps.image-ref.outputs.image_ref }}
      immutable_image: ${{ steps.immutable-image.outputs.value }}
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955

      - name: Resolve image repository
        id: image-repository
        env:
          REGISTRY_HOSTNAME: ${{ inputs.registry_hostname }}
          REGISTRY_ACCOUNT_ID: ${{ inputs.registry_account_id }}
        run: |
          if [ -n "$REGISTRY_HOSTNAME" ]; then
            registry_host="$REGISTRY_HOSTNAME"
          elif [ -n "$REGISTRY_ACCOUNT_ID" ]; then
            registry_host="${REGISTRY_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          else
            registry_host=""
          fi

          repository_path="${ECR_NAMESPACE}/${APP_NAME}"
          if [ -n "$registry_host" ]; then
            image_repository="${registry_host}/${repository_path}"
          else
            image_repository="${repository_path}"
          fi

          {
            echo "registry_host=${registry_host}"
            echo "image_repository=${image_repository}"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve registry role
        id: registry-role
        env:
          REGISTRY_ACCOUNT_ID: ${{ inputs.registry_account_id }}
          REGISTRY_ROLE_NAME: ${{ inputs.aws_registry_role_name }}
          REGISTRY_ROLE_ARN: ${{ inputs.aws_registry_role_to_assume }}
          REGISTRY_ROLE_SECRET: ${{ secrets.AWS_REGISTRY_ROLE }}
        run: |
          role_to_assume="$REGISTRY_ROLE_ARN"

          if [ -z "$role_to_assume" ] && [ -n "$REGISTRY_ACCOUNT_ID" ] && [ -n "$REGISTRY_ROLE_NAME" ]; then
            role_to_assume="arn:aws:iam::${REGISTRY_ACCOUNT_ID}:role/${REGISTRY_ROLE_NAME}"
          fi

          if [ -z "$role_to_assume" ] && [ -n "$REGISTRY_ROLE_SECRET" ]; then
            role_to_assume="$REGISTRY_ROLE_SECRET"
          fi

          echo "value=${role_to_assume}" >> "$GITHUB_OUTPUT"

      - name: Validate publish configuration
        if: inputs.push_image
        env:
          IMAGE_REPOSITORY: ${{ steps.image-repository.outputs.image_repository }}
          REGISTRY_HOST: ${{ steps.image-repository.outputs.registry_host }}
          AWS_REGISTRY_ROLE_TO_ASSUME: ${{ steps.registry-role.outputs.value }}
        run: |
          test -n "$IMAGE_REPOSITORY" \
            || { echo "Image repository could not be determined" >&2; exit 1; }

          test -n "$AWS_REGISTRY_ROLE_TO_ASSUME" \
            || { echo "Provide aws_registry_role_to_assume, or registry_account_id with aws_registry_role_name, or secret AWS_REGISTRY_ROLE when pushing" >&2; exit 1; }

          test -n "$REGISTRY_HOST" \
            || { echo "A remote registry must be configured when push_image is enabled" >&2; exit 1; }

      - name: Lint Dockerfile with Hadolint
        if: inputs.lint_dockerfile
        id: hadolint
        env:
          DOCKERFILE: ${{ inputs.dockerfile }}
        run: |
          test -f "$DOCKERFILE" || { echo "Dockerfile '$DOCKERFILE' not found" >&2; exit 1; }
          docker run --rm -i hadolint/hadolint:2.12.0 hadolint - < "$DOCKERFILE"

      - name: Set up Python
        if: inputs.lint_python || inputs.run_unit_tests || inputs.run_integration_tests
        id: setup-python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065

      - name: Install Ruff
        if: inputs.lint_python
        run: python -m pip install ruff

      - name: Ruff formatting
        if: inputs.lint_python
        id: ruff-format
        env:
          NO_COLOR: 1
        run: ruff format --check --diff ${{ inputs.docker_context }}

      - name: Ruff linting
        if: inputs.lint_python
        id: ruff-lint
        env:
          NO_COLOR: 1
        run: ruff check --diff ${{ inputs.docker_context }}

      - name: Generate dependency cache manifest
        if: inputs.run_unit_tests || inputs.run_integration_tests
        env:
          PIP_EXTRAS: ${{ inputs.pip_install_extras }}
          DOCKER_CONTEXT: ${{ inputs.docker_context }}
          DEPENDENCY_MANIFEST_PATH: .github/.cache/python-deps-manifest.txt
        run: |
          manifest_path="${DEPENDENCY_MANIFEST_PATH:-.github/.cache/python-deps-manifest.txt}"
          docker_context="${DOCKER_CONTEXT:-.}"
          pip_extras="${PIP_EXTRAS:-}"

          mkdir -p "$(dirname "$manifest_path")"

          append_file_hash() {
            local file_path="$1"

            if [ -f "$file_path" ]; then
              printf 'file:%s sha256:%s\n' "$file_path" "$(sha256sum "$file_path" | awk '{print $1}')" >> "$manifest_path"
            fi
          }

          {
            printf 'schema:v1\n'
            printf 'python_version:%s\n' "$(python -VV 2>&1 | tr '\n' ' ')"
            printf 'pip_extras:%s\n' "$pip_extras"
            printf 'docker_context:%s\n' "$docker_context"
          } > "$manifest_path"

          install_target=""
          if [ -f pyproject.toml ]; then
            install_target="."
          elif [ -n "$docker_context" ] && [ -f "$docker_context/pyproject.toml" ]; then
            install_target="$docker_context"
          fi

          printf 'install_target:%s\n' "$install_target" >> "$manifest_path"

          if [ -n "$install_target" ]; then
            if [ "$install_target" = "." ]; then
              append_file_hash "pyproject.toml"
              append_file_hash "uv.lock"
              append_file_hash "poetry.lock"
            else
              append_file_hash "$install_target/pyproject.toml"
              append_file_hash "$install_target/uv.lock"
              append_file_hash "$install_target/poetry.lock"
            fi
          fi

          append_file_hash "requirements.txt"
          append_file_hash "requirements-dev.txt"

          if [ "$docker_context" != "." ]; then
            append_file_hash "$docker_context/requirements.txt"
            append_file_hash "$docker_context/requirements-dev.txt"
          fi

      - name: Configure Python dependency caching
        if: inputs.run_unit_tests || inputs.run_integration_tests
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .cache/pip
            .cache/uv
          key: ${{ runner.os }}-pydeps-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('.github/.cache/python-deps-manifest.txt') }}
          restore-keys: |
            ${{ runner.os }}-pydeps-${{ steps.setup-python.outputs.python-version }}-
            ${{ runner.os }}-pydeps-

      - name: Install project dependencies
        if: inputs.run_unit_tests || inputs.run_integration_tests
        env:
          PIP_EXTRAS: ${{ inputs.pip_install_extras }}
          DOCKER_CONTEXT: ${{ inputs.docker_context }}
        run: |
          export PIP_CACHE_DIR="${PIP_CACHE_DIR:-.cache/pip}"
          export UV_CACHE_DIR="${UV_CACHE_DIR:-.cache/uv}"
          mkdir -p "$PIP_CACHE_DIR" "$UV_CACHE_DIR"

          python -m pip install --upgrade pip

          install_target=""
          if [ -f pyproject.toml ]; then
            install_target="."
          elif [ -n "$DOCKER_CONTEXT" ] && [ -f "$DOCKER_CONTEXT/pyproject.toml" ]; then
            install_target="$DOCKER_CONTEXT"
          fi

          if [ -n "$install_target" ]; then
            python -m pip install --upgrade uv
            if [ -n "$PIP_EXTRAS" ]; then
              uv pip install --system "${install_target}[${PIP_EXTRAS}]" \
                || uv pip install --system "$install_target" \
                || python -m pip install "${install_target}[${PIP_EXTRAS}]" \
                || python -m pip install "$install_target"
            else
              uv pip install --system "$install_target" \
                || python -m pip install "$install_target"
            fi
          fi

          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
            if [ -f requirements-dev.txt ]; then
              python -m pip install -r requirements-dev.txt
            fi
          fi

          if [ -n "$DOCKER_CONTEXT" ] && [ "$DOCKER_CONTEXT" != "." ] && [ -f "$DOCKER_CONTEXT/requirements.txt" ]; then
            python -m pip install -r "$DOCKER_CONTEXT/requirements.txt"
            if [ -f "$DOCKER_CONTEXT/requirements-dev.txt" ]; then
              python -m pip install -r "$DOCKER_CONTEXT/requirements-dev.txt"
            fi
          fi

      - name: Run unit tests
        if: inputs.run_unit_tests
        id: unit-tests
        env:
          UNIT_TEST_COMMAND: ${{ inputs.unit_test_command }}
        run: bash -eo pipefail -c "$UNIT_TEST_COMMAND"

      - name: Upload coverage artifact
        if: inputs.run_unit_tests && always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: ignore
          retention-days: 7

      - name: Run integration tests
        if: inputs.run_integration_tests
        id: integration-tests
        env:
          INTEGRATION_TEST_COMMAND: ${{ inputs.integration_test_command }}
        run: bash -eo pipefail -c "$INTEGRATION_TEST_COMMAND"

      - name: Upload integration artifacts
        if: inputs.run_integration_tests && always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: integration-artifacts
          path: ${{ inputs.integration_artifact_path }}
          if-no-files-found: ignore
          retention-days: 7

      - name: Configure AWS credentials
        if: inputs.push_image
        uses: aws-actions/configure-aws-credentials@5fd3084fc36e372ff1fff382a39b10d03659f355
        with:
          role-to-assume: ${{ steps.registry-role.outputs.value }}
          role-session-name: container-build-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: inputs.push_image
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076

      - name: Extract Docker metadata
        if: env.LOCAL_ACT != 'true'
        id: meta
        uses: docker/metadata-action@c1e51972afc2121e065aed6d45c65596fe445f3f
        with:
          images: ${{ steps.image-repository.outputs.image_repository }}
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=${{ inputs.release_tag }},enable=${{ inputs.release_tag != '' }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp || github.event.pull_request.updated_at }}

      - name: Generate Docker metadata for act
        if: env.LOCAL_ACT == 'true'
        id: meta-act
        env:
          IMAGE_REPOSITORY: ${{ steps.image-repository.outputs.image_repository }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          short_sha=$(printf '%s' "$GITHUB_SHA" | cut -c1-7)
          primary_tag="${IMAGE_REPOSITORY}:sha-${short_sha}"

          {
            echo "tags<<EOF"
            echo "$primary_tag"
            if [ -n "$RELEASE_TAG" ]; then
              echo "${IMAGE_REPOSITORY}:${RELEASE_TAG}"
            fi
            echo "EOF"
            echo "labels<<EOF"
            echo "org.opencontainers.image.source=${GITHUB_REPOSITORY}"
            echo "org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Capture image reference
        id: image-ref
        env:
          META_TAGS: ${{ steps.meta.outputs.tags != '' && steps.meta.outputs.tags || steps.meta-act.outputs.tags }}
        run: |
          primary_tag=$(printf '%s\n' "$META_TAGS" | head -n 1)
          echo "image_ref=${primary_tag}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${primary_tag##*:}" >> "$GITHUB_OUTPUT"

      - name: Determine application version
        id: image-version
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          DEFAULT_TAG: ${{ steps.image-ref.outputs.image_tag }}
        run: |
          if [ -n "$RELEASE_TAG" ]; then
            echo "value=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "value=$DEFAULT_TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Build container image
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        with:
          context: ${{ inputs.docker_context }}
          file: ${{ inputs.dockerfile }}
          push: ${{ inputs.push_image }}
          load: ${{ inputs.push_image == false }}
          tags: ${{ steps.meta.outputs.tags != '' && steps.meta.outputs.tags || steps.meta-act.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels != '' && steps.meta.outputs.labels || steps.meta-act.outputs.labels }}
          cache-from: ${{ inputs.push_image && format('type=registry,ref={0}:buildcache', steps.image-repository.outputs.image_repository) || '' }}
          cache-to: ${{ inputs.push_image && 'type=inline' || '' }}
          build-args: |
            APP_CODE_COMMIT_HASH=${{ github.sha }}
            APP_VERSION=${{ steps.image-version.outputs.value }}
            ${{ inputs.build_args }}

      - name: Smoke test built container
        if: inputs.run_container_smoke_test
        id: container-smoke-test
        env:
          IMAGE_UNDER_TEST: ${{ steps.image-ref.outputs.image_ref }}
          CONTAINER_SMOKE_TEST_COMMAND: ${{ inputs.container_smoke_test_command }}
          PUSH_IMAGE: ${{ inputs.push_image }}
        run: |
          test -n "$IMAGE_UNDER_TEST" \
            || { echo "Image reference could not be determined for smoke testing" >&2; exit 1; }

          test -n "$CONTAINER_SMOKE_TEST_COMMAND" \
            || { echo "container_smoke_test_command must not be empty when run_container_smoke_test is enabled" >&2; exit 1; }

          if [ "$PUSH_IMAGE" = "true" ]; then
            docker pull "$IMAGE_UNDER_TEST"
          else
            docker image inspect "$IMAGE_UNDER_TEST" >/dev/null
          fi

          bash -eo pipefail -c "$CONTAINER_SMOKE_TEST_COMMAND"

      - name: Capture immutable image reference
        if: inputs.push_image
        id: immutable-image
        env:
          IMAGE_REPOSITORY: ${{ steps.image-repository.outputs.image_repository }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: echo "value=${IMAGE_REPOSITORY}@${IMAGE_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        if: inputs.push_image && inputs.release_tag != '' && inputs.sign_release
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159

      - name: Sign release image digest
        if: inputs.push_image && inputs.release_tag != '' && inputs.sign_release
        env:
          IMAGE: ${{ steps.immutable-image.outputs.value }}
        run: cosign sign --yes "$IMAGE"

      - name: Summarise results
        if: always()
        id: build-summary
        env:
          HADOLINT_OUTCOME: ${{ steps.hadolint.outcome || 'skipped' }}
          UNIT_OUTCOME: ${{ steps.unit-tests.outcome || 'skipped' }}
          INT_OUTCOME: ${{ steps.integration-tests.outcome || 'skipped' }}
          CONTAINER_SMOKE_OUTCOME: ${{ steps.container-smoke-test.outcome || 'skipped' }}
          PUSH_IMAGE: ${{ inputs.push_image }}
          IMAGE_REF: ${{ steps.image-ref.outputs.image_ref }}
          IMMUTABLE_IMAGE: ${{ steps.immutable-image.outputs.value || '' }}
          BUILD_OUTCOME: ${{ steps.build.outcome || 'skipped' }}
          SUMMARY_FILE: ci-summary.md
        run: |
          {
            echo "### Container Image Build"
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| Dockerfile lint | ${HADOLINT_OUTCOME} |"
            echo "| Unit tests | ${UNIT_OUTCOME} |"
            echo "| Integration tests | ${INT_OUTCOME} |"
            echo "| Container smoke test | ${CONTAINER_SMOKE_OUTCOME} |"
            if [ "$PUSH_IMAGE" = "true" ] && [ "$BUILD_OUTCOME" = "success" ]; then
              echo ""
              echo "**Image:** \`${IMAGE_REF}\`"
              if [ -n "$IMMUTABLE_IMAGE" ]; then
                echo ""
                echo "**Immutable image:** \`${IMMUTABLE_IMAGE}\`"
              fi
            fi
          } > "$SUMMARY_FILE"

          cat "$SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"

      - name: Share summary in pull requests
        if: always() && github.event_name == 'pull_request' && env.LOCAL_ACT != 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const fs = require('fs');
            const summaryPath = 'ci-summary.md';
            if (!fs.existsSync(summaryPath)) {
              core.info('Summary file not found; skipping comment update.');
              return;
            }
            const issueNumber = context.payload?.pull_request?.number;
            if (!issueNumber) {
              core.info('No pull request number available; skipping comment update.');
              return;
            }
            const body = fs.readFileSync(summaryPath, 'utf8');
            const marker = '<!-- container-image-build summary -->';
            const finalBody = `${marker}\n${body}`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              issue_number: issueNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(
              (comment) => comment.user.type === 'Bot' && comment.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: finalBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: finalBody,
              });
            }
