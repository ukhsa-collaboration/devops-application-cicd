name: "Deploy AWS ECS"

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      service_identifier:
        required: true
        type: string
      aws_region:
        required: false
        default: "eu-west-2"
        type: string
      runner_labels:
        required: false
        default: '["ubuntu-latest"]'
        type: string
      immutable_image:
        description: Fully qualified immutable image reference to deploy.
        required: true
        type: string
      deploy_environments:
        description: JSON array of deployment descriptors.
        required: true
        type: string
      aws_deploy_role_name:
        description: Default IAM role name to assume in workload accounts when deploy environment entries provide aws_account_id instead of a full ARN.
        required: false
        default: ""
        type: string
      deployment_checkout_ref:
        description: Optional ref (branch, tag, SHA) to checkout for deployment scripts/tests.
        required: false
        default: ""
        type: string
    secrets:
      AWS_DEPLOY_ROLE:
        required: false

permissions:
  contents: read
  id-token: write
  actions: read
  pull-requests: none

env:
  APP_NAME: ${{ inputs.app_name }}
  AWS_REGION: ${{ inputs.aws_region }}
  SERVICE_IDENTIFIER: ${{ inputs.service_identifier }}

jobs:
  prepare-deploy:
    name: Prepare deployment environments
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
    steps:
      - id: compute
        env:
          RAW_ENVIRONMENTS: ${{ inputs.deploy_environments }}
          DEFAULT_DEPLOY_ROLE_NAME: ${{ inputs.aws_deploy_role_name }}
        run: |
          python <<'PY'
          import json
          import os

          raw = (os.getenv("RAW_ENVIRONMENTS") or "").strip()

          if not raw:
              matrix = []
          else:
              try:
                  data = json.loads(raw)
              except json.JSONDecodeError as exc:
                  raise SystemExit(f"deploy_environments must be valid JSON: {exc}")

              if not isinstance(data, list):
                  raise SystemExit("deploy_environments must be a JSON array")

              service_identifier = os.getenv("SERVICE_IDENTIFIER") or ""
              app = os.getenv("APP_NAME") or ""
              region = os.getenv("AWS_REGION") or ""
              default_deploy_role_name = os.getenv("DEFAULT_DEPLOY_ROLE_NAME") or ""
              matrix = []

              for item in data:
                  if isinstance(item, str):
                      obj = {"name": item}
                  elif isinstance(item, dict):
                      obj = dict(item)
                  else:
                      continue

                  name = obj.get("name")
                  if not name:
                      continue

                  env_lower = str(name).lower()
                  aws_account_id = obj.get("aws_account_id") or ""
                  aws_deploy_role_name = obj.get("aws_deploy_role_name") or default_deploy_role_name

                  obj.setdefault("container_name", "app")
                  obj.setdefault("task_definition", f"aw-{service_identifier}-{region}-{env_lower}-ecssvc-{app}")
                  obj.setdefault("ecs_service", f"aw-{service_identifier}-{region}-{env_lower}-ecssvc-{app}")
                  obj.setdefault("ecs_cluster", f"aw-{service_identifier}-{region}-{env_lower}-ecscluster")

                  if not obj.get("aws_role_to_assume") and aws_account_id and aws_deploy_role_name:
                      obj["aws_role_to_assume"] = f"arn:aws:iam::{aws_account_id}:role/{aws_deploy_role_name}"

                  matrix.append(obj)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"matrix={json.dumps(matrix)}\n")
          PY

  deploy:
    name: Deploy ${{ matrix.environment.name }}
    needs: prepare-deploy
    if: needs.prepare-deploy.outputs.matrix != '[]'
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 45
    strategy:
      max-parallel: 1
      matrix:
        environment: ${{ fromJSON(needs.prepare-deploy.outputs.matrix != '' && needs.prepare-deploy.outputs.matrix || '[]') }}
    environment: ${{ matrix.environment.name }}
    concurrency:
      group: deploy-${{ github.repository }}-${{ matrix.environment.name }}
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
      actions: read
      pull-requests: none
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955
        with:
          ref: ${{ inputs.deployment_checkout_ref != '' && inputs.deployment_checkout_ref || github.sha }}

      - name: Validate deployment configuration
        env:
          ROLE_TO_ASSUME: ${{ matrix.environment.aws_role_to_assume || secrets.AWS_DEPLOY_ROLE }}
          IMAGE_URI: ${{ inputs.immutable_image }}
        run: |
          test -n "$IMAGE_URI" \
            || { echo "immutable_image is required" >&2; exit 1; }

          test -n "$ROLE_TO_ASSUME" \
            || { echo "Deployment role is required via aws_role_to_assume or secret AWS_DEPLOY_ROLE" >&2; exit 1; }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@5fd3084fc36e372ff1fff382a39b10d03659f355
        with:
          role-to-assume: ${{ matrix.environment.aws_role_to_assume || secrets.AWS_DEPLOY_ROLE }}
          role-session-name: deploy-${{ matrix.environment.name }}-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Parameter Store image reference
        if: matrix.environment.ssm_parameter_name != ''
        env:
          IMAGE_URI: ${{ inputs.immutable_image }}
          PARAMETER_NAME: ${{ matrix.environment.ssm_parameter_name }}
        run: |
          test -n "$PARAMETER_NAME" \
            || { echo "Parameter name missing" >&2; exit 1; }

          aws ssm put-parameter \
            --name "$PARAMETER_NAME" \
            --type "String" \
            --value "$IMAGE_URI" \
            --overwrite

      - name: Download ECS task definition
        if: matrix.environment.task_definition != ''
        env:
          TASK_DEFINITION: ${{ matrix.environment.task_definition }}
        run: aws ecs describe-task-definition --task-definition "$TASK_DEFINITION" --query taskDefinition > task-definition.json

      - name: Render ECS task definition
        if: matrix.environment.task_definition != '' && matrix.environment.container_name != ''
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@5cb8c74c1b1ecaec4c8ea82eff82c009333509ce
        with:
          task-definition: task-definition.json
          container-name: ${{ matrix.environment.container_name }}
          image: ${{ inputs.immutable_image }}

      - name: Deploy ECS service
        if: matrix.environment.ecs_service != '' && matrix.environment.ecs_cluster != '' && steps.render-task-def.outputs.task-definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@4b08990e8909cf36bc2ca95f994312f090c41865
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ matrix.environment.ecs_service }}
          cluster: ${{ matrix.environment.ecs_cluster }}
          wait-for-service-stability: true

      - name: Set up Python for deployment tasks
        if: matrix.environment.integration_test_command != ''
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          cache: "pip"

      - name: Run post-deploy script
        if: matrix.environment.deploy_script != ''
        env:
          DEPLOY_ENVIRONMENT: ${{ matrix.environment.name }}
          DEPLOY_IMAGE: ${{ inputs.immutable_image }}
        run: bash -eo pipefail ${{ matrix.environment.deploy_script }}

      - name: Run environment specific integration tests
        if: matrix.environment.integration_test_command != ''
        env:
          DEPLOY_ENVIRONMENT: ${{ matrix.environment.name }}
          BASE_URL: ${{ matrix.environment.base_url }}
          INTEGRATION_TEST_COMMAND: ${{ matrix.environment.integration_test_command }}
        run: bash -eo pipefail -c "$INTEGRATION_TEST_COMMAND"

      - name: Smoke test deployed service
        if: matrix.environment.smoke_test_url != ''
        env:
          URL: ${{ matrix.environment.smoke_test_url }}
        run: |
          USER_AGENT="Mozilla/5.0 (compatible; SmokeTest/1.0)"
          code=$(curl -A "$USER_AGENT" -L -s -o /dev/null -w "%{http_code}" "$URL")

          if [ "$code" -ne 200 ]; then
            echo "Smoke test failed with status $code for $URL" >&2
            exit 1
          fi

          echo "Smoke test succeeded for $URL"

      - name: Append deployment summary
        if: always()
        env:
          DEPLOY_ENVIRONMENT: ${{ matrix.environment.name }}
          DEPLOY_IMAGE: ${{ inputs.immutable_image }}
          SMOKE_TEST_URL: ${{ matrix.environment.smoke_test_url || '' }}
        run: |
          {
            echo "### Deployment (${DEPLOY_ENVIRONMENT})"
            echo "Environment: ${DEPLOY_ENVIRONMENT}"
            echo "Image: ${DEPLOY_IMAGE}"
            if [ -n "${SMOKE_TEST_URL}" ]; then
              echo "Smoke test: ${SMOKE_TEST_URL}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
